<!DOCTYPE html>
<html dir="rtl">

<head>
<meta charset="UTF-8"/>
<meta http-equiv="X-UA-Compatible" content="IE-edge"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/8e525a80c8.js" crossorigin="anonymous"></script>

<title>خلاب. تسجيل</title>

</head>

<body class="register-page">
<header>
 <h2 class="logo">خلاب .</h2>  
 <nav class="nav">
    
 <a href="index.html"><i class="fa-solid fa-house"></i></a>
 
 </nav>
</header>


<div class="wrapper">
  <div class="form-box register">
    <h2>انشاء حساب جديد</h2>
    <form action="data.php" method="get">
        <div class="input-box">
            <span class="icon"><i class="fa-solid fa-user"></i></span>
            <input type="text" name="username" required>
            <label>اسم المستخدم</label>
        </div>
        <div class="input-box">
            <span class="icon"><i class="fa-solid fa-envelope"></i></span>
            <input type="email" name="useremail" required>
            <label>الايميل</label>
        </div>
        <div class="input-box">
            <span class="icon"><i class="fa-solid fa-lock"></i></span>
            <input type="password" name="password" required>
            <label>كلمة المرور</label>
        </div>
        <button type="submit" name="signup" class="btn">انشاء حساب</button>
        <div class="login-register">
            <p>لديك حساب؟ <a href="login.html">تسجيل دخول</a></p>
        </div>
    </form>
  </div>
</div>

<script src="https://kit.fontawesome.com/8e525a80c8.js" crossorigin="anonymous"></script>
</body>
</html>
